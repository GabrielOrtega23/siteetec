<div class = "bloco-2"></div>

            <div class="campo">
                <label>Nome Completo</label>
                <input type="text" placeholder="Seu nome">
            </div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email" placeholder="email@exemplo.com">

            <div class="campo">
                <label>Senha</label>
                <input type="password" placeholder="Senha">
            </div>

            <div class="campo">
                <label >Mensagem</label>
                <br>
              
                <textarea style="width: 420px; background-color: #ebebeb;  border: none;  border-radius: 4px; ;" rows="5" ></textarea>

                <a href="../index.html" class="btn-enviar">Enviar</a>

    <img class = "imgf" src="../imagens/cps-removebg-preview.png" alt="">

    </div>
        </footer>
        <script>
document.querySelector(".btn-enviar").addEventListener("click", function(e){

    const nome = document.querySelector('input[type="text"]').value.trim();
    const email = document.querySelector('input[type="email"]').value.trim();
    const senha = document.querySelector('input[type="password"]').value;
    const mensagem = document.querySelector("textarea").value.trim();

    if(nome === ""){
        alert("Digite seu nome.");
        e.preventDefault();
        return;
    }

    if(nome.length < 5){
        alert("Digite seu nome completo.");
        e.preventDefault();
        return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailRegex.test(email)){
        alert("Digite um e-mail válido.");
        e.preventDefault();
        return;
    }

    if(senha.length < 8){
        alert("A senha deve ter pelo menos 8 caracteres.");
        e.preventDefault();
        return;
    }

    if(mensagem.length < 10){
        alert("Digite uma mensagem com pelo menos 10 caracteres.");
        e.preventDefault();
        return;
    }

    alert("Mensagem enviada com sucesso!");
});
</script>
<script src="../JS/validacao.js"></script>
